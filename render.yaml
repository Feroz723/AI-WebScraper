services:
  - type: web
    name: ai-web-scraper
    runtime: python
    pythonVersion: "3.12.0"
    buildCommand: bash build.sh
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/.cache/ms-playwright
      - key: PYTHON_VERSION
        value: "3.12.0"
